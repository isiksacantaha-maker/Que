<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ürün Detayı | Que Jewelry</title>
    <link rel="stylesheet" href="üstpanel.css">
    <style>
        body { background: #fff; color: #333; padding-top: 100px; font-family: 'Segoe UI', sans-serif; }
        .detail-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 50px; padding: 20px; }
        .product-images { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-images img { width: 100%; border-radius: 10px; }
        .product-images img.main { grid-column: span 2; }
        .product-info { flex: 1; }
        .product-info h1 { font-size: 32px; margin-bottom: 10px; }
        .product-info .price { font-size: 24px; font-weight: bold; color: #d4af37; margin-bottom: 20px; }
        .product-info p { line-height: 1.6; color: #666; }
        .add-to-cart-btn { 
            background: #000; color: #fff; border: none; padding: 15px 40px; 
            border-radius: 30px; cursor: pointer; font-size: 16px; margin-top: 30px;
        }
    </style>
</head>
<body>
    <div id="detail-content" class="detail-container">
        </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        // Sayfa yüklendiğinde URL'den ID al ve ürünü göster
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            showProductDetail(id);
        };
    </script>
</body>
</html>
