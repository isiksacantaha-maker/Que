    <!-- Critical inline styles to ensure page displays even if external CSS encoding fails -->
    <style>
        :root {
            --bg: #000;
            --card: #fff;
            --accent: #c5a059
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 18px 5%;
            box-sizing: border-box;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px)
        }

        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-weight: 300
        }

        .video-section-wrapper {
            position: relative;
            height: 120vh;
            background: #000
        }

        .sticky-video-container {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden
        }

        #scrollVideo {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .vitrin-section {
            background: var(--card);
            color: #111;
            margin-top: -10vh;
            border-radius: 40px 40px 0 0;
            padding: 80px 6%;
            z-index: 10
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            padding-top: 30px
        }

        .product-card {
            background: #fff;
            color: #111;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer
        }

        .image-slider {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #f6f6f6
        }

        .p-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity .25s
        }

        .p-img.active {
            opacity: 1
        }

        .card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5
        }

        .view-all-container {
            text-align: center;
            margin-top: 40px
        }

        .view-all-btn {
            display: inline-block;
            padding: 12px 36px;
            border-radius: 40px;
            border: 1px solid #000;
            color: #000;
            background: #fff;
            text-decoration: none
        }

        @media(max-width:900px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:600px) {
            .product-grid {
                grid-template-columns: 1fr
            }

            .vitrin-section {
                padding: 40px 6%
            }
        }
    </style>

</head>
